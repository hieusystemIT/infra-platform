apiVersion: v1
kind: ConfigMap
metadata:
  name: oncall-config
  namespace: {{ .Values.namespace }}
data:
  oncall.yaml: |
    group_chat_id: {{ .Values.oncall.group_chat_id | quote }}
    schedule:
    {{- range .Values.oncall.schedule }}
      - name: {{ .name | quote }}
        telegram: {{ .telegram | quote }}
        days: {{ .days | toJson }}
        hours:
        {{- range .hours }}
          - start: {{ .start | quote }}
            end: {{ .end | quote }}
        {{- end }}
    {{- end }}