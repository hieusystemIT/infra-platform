replicaCount: 1

image:
  repository: us-central1-docker.pkg.dev/project-52700b7f-e48a-4255-bd4/tele-call/alert-caller
  tag: "v2"
  pullPolicy: Always

namespace: alert-caller

env:
  timezone: "Asia/Ho_Chi_Minh"

telegram:
  credentialsSecret: telegram-credentials
  sessionSecret: telegram-session

service:
  type: ClusterIP
  port: 8000

resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    cpu: 200m
    memory: 256Mi

oncall:
  group_chat_id: "-1003940071694"

  # Chỉ xử lý alert có severity trong list này
  call_on_severities:
    - disaster

  # K8s alert: chỉ gọi khi namespace match pattern này
  # Infrastructure alert (không có namespace): gọi luôn
  call_on_namespace_patterns:
    - ".*-production"

  # Chỉ gọi khi alert đến từ các receiver này
  call_on_receivers:
    - postgresql-telegram
    - k8s-pod-telegram
    - k8s-container-telegram
    - infra-telegram
    - etcd-telegram
    - redis-telegram
    - cassandra-telegram
    - rabbitmq-telegram
    # Không include:
    # - telegram-ambassador-*
    # - telegram-application-logs
    # - telegram-nginx-*

  schedule:
    - name: "hieudd"
      telegram: "@SeanNG21"
      user_id: 2014724625
      days: [2, 3, 4, 5, 6]
      hours:
        - start: "08:30"
          end: "23:30"

    - name: "coach Quynh"
      telegram: "@xuanquynhqbf"
      user_id: 765199915
      days: [2, 3, 4, 5, 6]
      hours:
        - start: "08:30"
          end: "23:30"

